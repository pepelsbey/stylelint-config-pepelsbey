name: Update

on:
  push:
    branches:
      - main
    paths:
      - package-lock.json
  workflow_dispatch:

jobs:
  check-properties:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for new properties
        id: check
        run: |
          if node update.js; then
            echo "has_missing=false" >> $GITHUB_OUTPUT
          else
            echo "has_missing=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update issue
        if: steps.check.outputs.has_missing == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const missing = JSON.parse(fs.readFileSync('missing.json', 'utf8'));
            const missingList = missing.map(p => `- ${p}`).join('\n');

            const title = 'New CSS properties detected';
            const body = [
              'The weekly check found new CSS properties in [@mdn/browser-compat-data](https://github.com/mdn/browser-compat-data) that are not in the config:',
              '',
              missingList,
              '',
              '**Action needed:** Review these properties and consider adding them to `order.js`.'
            ].join('\n');

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'missing'
            });

            const existingIssue = existingIssues.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['missing']
              });
              console.log(`Created new issue #${newIssue.number}`);
            }

      - name: Close resolved issue
        if: steps.check.outputs.has_missing == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'New CSS properties detected';

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'missing'
            });

            const existingIssue = existingIssues.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: 'All properties are now present in the config. Closing automatically.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Closed resolved issue #${existingIssue.number}`);
            }
